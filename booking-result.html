<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Reservation — Merdz Sky Wellness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:oklch(97% 0.014 80);--ink:oklch(24% 0.02 55);--ink-soft:oklch(42% 0.025 55);
  --ink-faint:oklch(60% 0.02 55);--sage-deep:oklch(50% 0.06 150);--sage-pale:oklch(92% 0.025 150);
  --gold-deep:oklch(56% 0.1 65);--white:oklch(99% 0.005 80);--error:#B3432D;
  --radius-md:12px;--radius-lg:24px;--radius-pill:999px;
  --shadow-md:0 12px 32px oklch(24% 0.02 55 / 0.10);
  --font-display:'Playfair Display',Georgia,serif;--font-body:'Golos Text',system-ui,sans-serif;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-body);background:var(--cream);color:var(--ink);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6;}
.card{background:var(--white);border:1px solid oklch(24% 0.02 55 / 0.07);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);max-width:520px;width:100%;padding:40px 32px;text-align:center;}
.badge{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.badge svg{width:38px;height:38px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.ok{background:var(--sage-pale);color:var(--sage-deep);}
.warn{background:oklch(90% 0.05 75);color:var(--gold-deep);}
.bad{background:oklch(90% 0.04 25);color:var(--error);}
h1{font-family:var(--font-display);font-weight:600;font-size:28px;margin:0 0 8px;}
p.sub{color:var(--ink-soft);margin:0 0 20px;}
.ref{font-family:var(--font-display);font-size:26px;letter-spacing:.04em;margin:6px 0 20px;}
.detail{text-align:left;background:var(--cream);border-radius:var(--radius-md);padding:18px 20px;margin:0 0 24px;}
.detail .row{display:flex;justify-content:space-between;font-size:14px;color:var(--ink-soft);margin-bottom:8px;}
.detail .row:last-child{margin-bottom:0;}
.detail .row strong{color:var(--ink);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;border-radius:var(--radius-pill);
  font-weight:600;font-family:inherit;font-size:15px;border:1px solid transparent;cursor:pointer;text-decoration:none;}
.btn-primary{background:var(--ink);color:var(--white);}
.btn-outline{background:transparent;color:var(--ink);border-color:oklch(24% 0.02 55 / 0.25);}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.muted{color:var(--ink-faint);font-size:13px;margin-top:18px;}
.demo-tag{display:inline-block;background:var(--sage-pale);color:var(--sage-deep);font-size:12px;font-weight:700;
  padding:3px 10px;border-radius:var(--radius-pill);margin-bottom:14px;}
.spin{width:34px;height:34px;border:3px solid var(--sage-pale);border-top-color:var(--sage-deep);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion:reduce){.spin{animation-duration:0.01ms;}}
</style>
</head>
<body>
<main class="card" id="card" role="status" aria-live="polite">
  <div class="spin" id="spin"></div>
  <h1 id="title">Checking your reservation…</h1>
  <p class="sub" id="sub">Verifying the payment with our server.</p>
</main>

<script>
(function () {
  "use strict";
  var qs = new URLSearchParams(location.search);
  var ref = (qs.get("ref") || "").trim();
  var hint = (qs.get("result") || "").toLowerCase();
  var lang = (function () { try { return localStorage.getItem("merdz-lang") === "mk" ? "mk" : "en"; } catch (e) { return "en"; } })();

  var T = {
    en: {
      checking: "Checking your reservation…", verifying: "Verifying the payment with our server.",
      confirmedT: "Reservation confirmed", confirmedS: "Thank you! Your booking is confirmed and we've emailed your confirmation.",
      pendingT: "Awaiting payment", pendingS: "We're holding your dates. If you closed the payment window, you can try again from the booking section.",
      cancelT: "Payment cancelled", cancelS: "Your payment was cancelled and no charge was made. Your dates are not reserved.",
      failedT: "Payment not completed", failedS: "We couldn't confirm a payment for this reservation. No charge was made (or it will be reversed).",
      conflictT: "Dates no longer available", conflictS: "Unfortunately these dates were just confirmed by someone else. If you were charged, we'll refund you — please contact us.",
      notFoundT: "Reservation not found", notFoundS: "We couldn't find this reservation reference.",
      ref: "Reservation reference", checkin: "Check-in", checkout: "Check-out", nights: "Nights",
      total: "Total", method: "Payment method", status: "Payment status", paid: "Paid",
      home: "Back to website", book: "Try again", contact: "Contact us", demo: "DEMO — simulated payment"
    },
    mk: {
      checking: "Ја проверуваме вашата резервација…", verifying: "Го потврдуваме плаќањето на нашиот сервер.",
      confirmedT: "Резервацијата е потврдена", confirmedS: "Ви благодариме! Резервацијата е потврдена и испративме потврда на е-пошта.",
      pendingT: "Се чека плаќање", pendingS: "Ги задржуваме вашите датуми. Ако сте го затвориле прозорецот за плаќање, обидете се повторно од делот за резервации.",
      cancelT: "Плаќањето е откажано", cancelS: "Плаќањето беше откажано и не беше наплатено. Датумите не се резервирани.",
      failedT: "Плаќањето не е завршено", failedS: "Не можевме да потврдиме плаќање за оваа резервација. Не беше наплатено (или ќе биде вратено).",
      conflictT: "Датумите повеќе не се слободни", conflictS: "За жал, датумите штотуку ги потврди некој друг. Ако сте наплатени, ќе ви вратиме — контактирајте нè.",
      notFoundT: "Резервацијата не е најдена", notFoundS: "Не можевме да го најдеме овој број на резервација.",
      ref: "Број на резервација", checkin: "Пристигнување", checkout: "Заминување", nights: "Ноќевања",
      total: "Вкупно", method: "Начин на плаќање", status: "Статус", paid: "Платено",
      home: "Назад на веб-страницата", book: "Обиди се повторно", contact: "Контакт", demo: "ДЕМО — симулирано плаќање"
    }
  };
  function t(k) { return (T[lang] && T[lang][k]) || T.en[k]; }
  function fmt(iso) { if (!iso) return "—"; var p = iso.split("-"); return p[2] + "." + p[1] + "." + p[0]; }

  var SVG = {
    check: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
    clock: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>',
    cross: '<svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>'
  };

  function render(state, data) {
    var badgeClass = "ok", icon = SVG.check, title = t("confirmedT"), sub = t("confirmedS");
    if (state === "pending") { badgeClass = "warn"; icon = SVG.clock; title = t("pendingT"); sub = t("pendingS"); }
    else if (state === "cancel") { badgeClass = "warn"; icon = SVG.cross; title = t("cancelT"); sub = t("cancelS"); }
    else if (state === "failed") { badgeClass = "bad"; icon = SVG.cross; title = t("failedT"); sub = t("failedS"); }
    else if (state === "conflict") { badgeClass = "bad"; icon = SVG.cross; title = t("conflictT"); sub = t("conflictS"); }
    else if (state === "notfound") { badgeClass = "bad"; icon = SVG.cross; title = t("notFoundT"); sub = t("notFoundS"); }

    var html = "";
    if (data && data.demo) html += '<div class="demo-tag">' + t("demo") + "</div>";
    html += '<div class="badge ' + badgeClass + '">' + icon + "</div>";
    html += "<h1>" + title + "</h1><p class='sub'>" + sub + "</p>";
    if (data && data.reference) {
      html += '<div style="font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint)">' + t("ref") + "</div>";
      html += '<div class="ref">' + esc(data.reference) + "</div>";
      html += '<div class="detail">';
      html += row(t("checkin"), fmt(data.checkIn));
      html += row(t("checkout"), fmt(data.checkOut));
      html += row(t("nights"), data.nights);
      html += row(t("total"), (data.currency || "EUR") + " " + Number(data.total || 0).toFixed(2));
      html += row(t("method"), label(data.paymentMethod));
      html += row(t("status"), state === "confirmed" ? t("paid") : esc(data.paymentStatus || "—"));
      html += "</div>";
    }
    html += '<div class="actions"><a class="btn btn-primary" href="/">' + t("home") + "</a>";
    if (state === "failed" || state === "cancel" || state === "pending") html += '<a class="btn btn-outline" href="/#reserve">' + t("book") + "</a>";
    html += "</div>";
    document.getElementById("card").innerHTML = html;
  }
  function row(k, v) { return '<div class="row"><span>' + k + "</span><strong>" + esc(v == null ? "—" : v) + "</strong></div>"; }
  function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]; }); }
  function label(m) { return m === "paypal" ? "PayPal" : (m === "nlb" ? "NLB Banka" : (m === "offline" ? "Offline" : "—")); }

  if (!/^MERDZ-[A-Z0-9]{8}$/.test(ref)) { render("notfound", null); return; }

  fetch("/api/booking-status?ref=" + encodeURIComponent(ref))
    .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function (d) {
      var paid = d.paymentStatus === "paid" || d.bookingStatus === "paid" || d.bookingStatus === "confirmed";
      var state;
      if (paid) state = "confirmed";
      else if (hint === "cancel" || d.bookingStatus === "cancelled") state = "cancel";
      else if (d.bookingStatus === "expired") state = "failed";
      else if (d.paymentStatus === "payment_failed") state = "failed";
      else if (hint === "conflict") state = "conflict";
      else if (hint === "failure") state = "failed";
      else state = "pending";
      render(state, d);
    })
    .catch(function () { render("notfound", null); });
})();
</script>
</body>
</html>

[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Static site - no build step required'"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[functions."expire-holds"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(self \"https://www.paypal.com\" \"https://www.sandbox.paypal.com\")"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://www.paypal.com https://www.paypalobjects.com https://www.sandbox.paypal.com https://www.sandbox.paypalobjects.com; frame-src 'self' https://www.paypal.com https://www.sandbox.paypal.com https://www.google.com https://maps.google.com; connect-src 'self' https://api.callmebot.com https://www.paypal.com https://www.sandbox.paypal.com https://api-m.paypal.com https://api-m.sandbox.paypal.com https://www.paypalobjects.com https://www.sandbox.paypalobjects.com; form-action 'self' https:; base-uri 'self'; object-src 'none'"

[[headers]]
  for = "/admin.html"

  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"

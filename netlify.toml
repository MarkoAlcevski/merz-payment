# ============================================================
#  Netlify configuration — Merdz Sky Wellness booking system
# ============================================================
# The website is a static site (index.html + assets). The booking
# backend runs as Netlify Functions under /.netlify/functions and is
# exposed to the frontend at /api/* via the redirect below.

[build]
  publish = "."
  functions = "netlify/functions"
  # No build step — the site is static. (Netlify still installs
  # package.json dependencies for the functions automatically.)
  command = "echo 'Static site — no build step required'"

[functions]
  node_bundler = "esbuild"

# Friendly API path: /api/availability -> /.netlify/functions/availability
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Scheduled function: release expired payment holds every 5 minutes.
[functions."expire-holds"]
  schedule = "*/5 * * * *"

# ------------------------------------------------------------
#  Security headers
# ------------------------------------------------------------
# NOTE: the existing site relies on inline <style> and an inline
# <script>, and loads Google Fonts, a Google Maps iframe and (optionally)
# the PayPal SDK. The CSP below intentionally allows 'unsafe-inline' so
# the current site keeps working unchanged. To harden it further you
# would need to move the inline script/styles into external files and
# drop 'unsafe-inline' — see BOOKING_SETUP.md (Security).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(self \"https://www.paypal.com\")"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://www.paypal.com https://www.paypalobjects.com; frame-src 'self' https://www.paypal.com https://www.google.com https://maps.google.com; connect-src 'self' https://api.callmebot.com https://www.paypal.com https://api-m.paypal.com https://api-m.sandbox.paypal.com; form-action 'self' https:; base-uri 'self'; object-src 'none'"

# Admin panel should never be cached or framed.
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
